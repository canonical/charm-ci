project: examples
path: /home/ubuntu/proj
kill-timeout: 60m
warn-timeout: 1m
backends:
  integration-test:
    type: integration-test
    systems:
    - ubuntu-24.04
    - ubuntu-24.04-selfhosted:
        runner: [self-hosted-linux-amd64-noble-medium]
environment:
  CONCIERGE: '$(HOST: echo "${CONCIERGE:-concierge.yaml}")'
  OPCLI_GIT_REF: '$(HOST: echo "${OPCLI_GIT_REF:-main}")'
  OPCLI_PACKAGE: '$(HOST: if grep -q "^name = .opcli." "${GITHUB_WORKSPACE:-}/pyproject.toml" 2>/dev/null; then echo "opcli @ git+https://github.com/canonical/charm-ci.git@$(git -C "${GITHUB_WORKSPACE}" rev-parse HEAD)"; else echo "opcli"; fi)'
exclude:
- .git
- .tox
- .venv
- .*_cache
# YAML anchor for shared pytest options — referenced by each suite below.
# pytest-arguments-template and pytest-environment-template are per-suite keys
# inside integration-suites. Use YAML anchors to avoid repetition.
x-pytest-args: &pytest-args
  pytest-arguments-template: |
    --model testing
    --keep-models

integration-suites:
  # Top-level integration tests (multi-charm, working-dir is project root)
  tests/integration/:
    <<: *pytest-args
    working-dir: ./
    summary: top-level integration tests
    backends:
    - integration-test
    environment:
      CONCIERGE/test_k8s_charm: concierge-microk8s.yaml
  # Sub-charm tests (monorepo pattern — working-dir scopes artifacts to k8s-charm/)
  k8s-charm/tests/integration/:
    <<: *pytest-args
    working-dir: k8s-charm/
    summary: k8s-charm sub-charm tests
    backends:
    - integration-test
    environment:
      CONCIERGE: concierge-microk8s.yaml
  # Machine-charm tests with explicit variants (no auto-discover)
  machine-charm/tests/integration/:
    <<: *pytest-args
    working-dir: machine-charm/
    auto-discover: false
    summary: machine-charm sub-charm tests
    backends:
    - integration-test
    environment:
      MODULE/test_charm: tests/integration/test_charm.py
