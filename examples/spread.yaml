project: examples
path: /home/ubuntu/proj
kill-timeout: 60m
warn-timeout: 1m
backends:
  integration-test:
    type: integration-test
    systems:
    - ubuntu-24.04
    - ubuntu-24.04-selfhosted:
        runner: [self-hosted-linux-amd64-noble-medium]
environment:
  CONCIERGE: '$(HOST: echo "${CONCIERGE:-concierge.yaml}")'
  OPCLI_GIT_REF: '$(HOST: echo "${OPCLI_GIT_REF:-main}")'
exclude:
- .git
- .tox
- .venv
- .*_cache
integration-suites:
  # Top-level integration tests (multi-charm, working-dir is project root)
  tests/integration/:
    working-dir: ./
    summary: top-level integration tests
    backends:
    - integration-test
    environment:
      CONCIERGE/test_k8s_charm: concierge-microk8s.yaml
  # Sub-charm tests (monorepo pattern — working-dir scopes artifacts to k8s-charm/)
  k8s-charm/tests/integration/:
    working-dir: k8s-charm/
    summary: k8s-charm sub-charm tests
    backends:
    - integration-test
    environment:
      CONCIERGE: concierge-microk8s.yaml
  # Machine-charm tests with explicit variants (no auto-discover)
  machine-charm/tests/integration/:
    working-dir: machine-charm/
    auto-discover: false
    summary: machine-charm sub-charm tests
    backends:
    - integration-test
    environment:
      MODULE/test_charm: tests/integration/test_charm.py
