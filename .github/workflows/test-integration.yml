name: Test Integration

# Tests the integration-test reusable workflow using the examples/ directory
# as a real operator repository fixture.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      upload-image:
        description: "Rock upload mode: 'artifact' to test fork-PR path, empty for default (registry)"
        type: string
        default: ""

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  integration-test:
    uses: ./.github/workflows/integration-test.yml
    with:
      working-directory: examples
      upload-image: ${{ inputs.upload-image || '' }}
    secrets: inherit
    permissions:
      packages: write
      contents: read
      actions: read

  # Run spread with the local (LXD) backend in parallel with the CI tests.
  # Uses 'opcli artifacts fetch --wait' to poll until the build uploads
  # artifacts-build, then downloads artifacts and runs spread without
  # CI=true so the local: backend (LXD VM) is used.
  test-local:
    name: "Spread (local/LXD)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      actions: read
    defaults:
      run:
        working-directory: examples
    steps:
      - uses: actions/checkout@v4

      - name: Setup tmate session (self-hosted)
        if: runner.debug == 1 && runner.environment == 'self-hosted'
        uses: canonical/action-tmate@main
        with:
          detached: true
          timeout-minutes: 60

      - name: Setup tmate session (GitHub-hosted)
        if: runner.debug == 1 && runner.environment == 'github-hosted'
        uses: mxschmitt/action-tmate@v3
        with:
          detached: true

      - name: Install uv
        run: sudo snap install astral-uv --classic

      - name: Install opcli
        run: uv tool install "opcli[cli] @ ${GITHUB_WORKSPACE}"

      - name: Install spread
        run: |
          sudo snap install go --classic
          go install github.com/canonical/spread/cmd/spread@latest
          sudo ln -sf ~/go/bin/spread /usr/local/bin/spread

      - name: Install LXD
        run: |
          sudo snap install lxd
          sudo lxd waitready
          sudo lxd init --auto
          sudo usermod -aG lxd $USER
          sudo chmod 0666 /var/snap/lxd/common/lxd/unix.socket
          sudo iptables -P FORWARD ACCEPT
          if sudo iptables -nL DOCKER-USER 2>/dev/null; then
            sudo iptables -I DOCKER-USER -i lxdbr0 -j ACCEPT
            sudo iptables -I DOCKER-USER -o lxdbr0 -m conntrack --ctstate RELATED,ESTABLISHED -j ACCEPT
          fi
          if sudo ip6tables -nL DOCKER-USER 2>/dev/null; then
            sudo ip6tables -I DOCKER-USER -i lxdbr0 -j ACCEPT
            sudo ip6tables -I DOCKER-USER -o lxdbr0 -m conntrack --ctstate RELATED,ESTABLISHED -j ACCEPT
          fi

      # --wait polls until the amd64 partial build manifests appear (build may still be running).
      # Auto-detection picks up the current runner's arch (amd64 on ubuntu-latest).
      - name: Fetch CI artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          opcli artifacts fetch \
            --run-id "${{ github.run_id }}" \
            --repo "${{ github.repository }}" \
            --wait

      # No CI=true → spread uses the local: backend (LXD VM).
      # _LOCAL_PREPARE inside the VM runs concierge and opcli provision load.
      # Explicitly clear CI to override GitHub Actions' default CI=true.
      # Set OPCLI_GIT_REF so the LXD VM installs the same opcli commit that
      # produced artifacts.build.yaml, keeping the format in sync.
      - name: Run spread (local/LXD)
        env:
          CI: ""
          OPCLI_GIT_REF: ${{ github.sha }}
        run: opcli spread run -- -vv integration-test-local:ubuntu-24.04:build/tests/integration/run:test_k8s_charm

  # ── Gate job (always reports) ────────────────────────────────────────────────
  # Required by branch protection. Passes when integration jobs succeed or are
  # skipped (paths filter didn't match). Set "Integration Gate" as a required
  # status check in repo settings.
  gate:
    name: Integration Gate
    if: always() && !cancelled()
    needs: [integration-test, test-local]
    runs-on: ubuntu-latest
    steps:
      - run: |
          for result in "${{ needs.integration-test.result }}" "${{ needs.test-local.result }}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "Integration job failed: $result"
              exit 1
            fi
          done
