name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  license-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check license headers
        uses: apache/skywalking-eyes/header@main
        with:
          config: .licenserc.yaml

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo snap install --classic astral-uv
      - run: uv sync --frozen
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/
      - run: uv run codespell

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo snap install --classic astral-uv
      - run: uv sync --frozen
      - run: uv run mypy src/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo snap install --classic astral-uv
      - run: uv sync --frozen
      - run: uv run pytest tests/unit/ --cov=opcli --cov-fail-under=85 -q

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: shellcheck .github/scripts/*.sh

  required-status-checks:
    name: Required Status Checks
    needs: [license-check, lint, type-check, test, shellcheck]
    runs-on: ubuntu-latest
    if: always() && !cancelled()
    steps:
      - run: |
          [ "${{ needs.license-check.result }}" = "success" ] || (echo "license-check failed" && false)
          [ "${{ needs.lint.result }}" = "success" ] || (echo "lint failed" && false)
          [ "${{ needs.type-check.result }}" = "success" ] || (echo "type-check failed" && false)
          [ "${{ needs.test.result }}" = "success" ] || (echo "test failed" && false)
          [ "${{ needs.shellcheck.result }}" = "success" ] || (echo "shellcheck failed" && false)
